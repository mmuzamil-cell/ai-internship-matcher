# ─── docker-compose.yml — Full Stack: FastAPI + Scraper + Redis + PostgreSQL ──
#
# Services:
#   db        → PostgreSQL 15 (shared by FastAPI and scrapers)
#   redis     → Redis 7 (Celery broker + dedup cache)
#   api       → FastAPI backend (localhost:8000)
#   worker    → Celery worker (processes scraping tasks)
#   beat      → Celery Beat scheduler (triggers daily scrapes)
#   flower    → Celery monitoring dashboard (localhost:5555) [optional]
#
# Quick start:
#   cp .env.example .env      # Fill in SECRET_KEY
#   docker compose up -d      # Start all services
#   docker compose logs -f    # Follow logs
#
# Manual scrape:
#   docker compose exec worker python run_scraper.py --site rozee --dry-run

version: "3.9"

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       internship_matcher
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Broker + Cache) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.scraper   # Reuse same image (has all deps)
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/internship_matcher
      REDIS_URL:    redis://redis:6379/0
      SECRET_KEY:   ${SECRET_KEY}
      UPLOAD_DIR:   uploads/resumes
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker (processes scraping tasks) ───────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    restart: unless-stopped
    command: >
      celery -A scraper.tasks worker
      --loglevel=info
      --concurrency=2
      --queues=scraper,maintenance
      --hostname=worker@%h
    environment:
      DATABASE_URL:      postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/internship_matcher
      REDIS_URL:         redis://redis:6379/0
      ADZUNA_APP_ID:     ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY:    ${ADZUNA_APP_KEY:-}
      RAPIDAPI_KEY:      ${RAPIDAPI_KEY:-}
      PROXY_LIST:        ${PROXY_LIST:-}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      # Chrome needs /dev/shm for shared memory (increase default 64MB)
      - /dev/shm:/dev/shm
    shm_size: "512mb"        # Give Chrome enough shared memory
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat Scheduler (triggers daily cron-like tasks) ────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    restart: unless-stopped
    command: celery -A scraper.tasks beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/internship_matcher
      REDIS_URL:    redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Flower (Celery monitoring dashboard) — optional ────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    restart: unless-stopped
    command: celery -A scraper.tasks flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

# ─── Persistent Volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
